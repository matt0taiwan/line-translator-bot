version: '3.8'

services:
  line-translator-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: line-translator-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./admin-queue:/app/admin-queue
      - ./data:/app/data
      - /opt/openclaw/.openclaw/workspace:/openclaw-workspace
    environment:
      - OPENCLAW_WORKSPACE=/openclaw-workspace
      - HISTORY_DB_PATH=/app/data/history.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
